send_raw_command:
  name: Send raw command
  description: Sends a raw text command to the targeted VoiceMeeter device
  target:
    entity:
      integration: vban
  fields:
    command:
      name: Command
      description: The raw command string
      required: true
      example: "Strip[0].Mute=1;"

set_gain:
  name: Set gain
  description: Set gain for a specific strip or bus entity
  target:
    entity:
      integration: vban
      domain:
        - number
        - switch
  fields:
    gain:
      name: Gain
      description: Gain in dB
      required: true
      example: -10.5

set_mute:
  name: Set mute
  description: Set mute state for a specific strip or bus entity
  target:
    entity:
      integration: vban
      domain:
        - switch
        - number
  fields:
    mute:
      name: Mute
      description: True to mute False to unmute
      required: true
      example: true
